name: Deploy Frontend

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment specific variables
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "DEPLOY_PATH=/var/www/ridaa-frontend-master" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=ridaa-frontend-prod" >> $GITHUB_OUTPUT
            echo "PORT=3002" >> $GITHUB_OUTPUT
            echo "BACKEND_PORT=5002" >> $GITHUB_OUTPUT
          else
            echo "DEPLOY_PATH=/var/www/ridaa-frontend-staging" >> $GITHUB_OUTPUT
            echo "CONTAINER_NAME=ridaa-frontend-staging" >> $GITHUB_OUTPUT
            echo "PORT=3000" >> $GITHUB_OUTPUT
            echo "BACKEND_PORT=5001" >> $GITHUB_OUTPUT
          fi

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: ${{ steps.vars.outputs.DEPLOY_PATH }}
          rm: true
          exclude: "node_modules,.git,.github,.env,.next"

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ github.ref_name == 'master' && secrets.FRONTEND_MASTER_ENV_FILE || secrets.FRONTEND_STAGING_ENV_FILE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_FILE
          script: |
            set -e
            DEPLOY_PATH="${{ steps.vars.outputs.DEPLOY_PATH }}"
            CONTAINER_NAME="${{ steps.vars.outputs.CONTAINER_NAME }}"
            PORT="${{ steps.vars.outputs.PORT }}"
            BACKEND_PORT="${{ steps.vars.outputs.BACKEND_PORT }}"

            cd "$DEPLOY_PATH"

            # Write env file safely
            # Write env file safely
            echo "${{ env.ENV_FILE }}" > .env

            # Generate docker-compose override
            echo "services:" > docker-compose.override.yml
            echo "  frontend:" >> docker-compose.override.yml
            echo "    container_name: $CONTAINER_NAME" >> docker-compose.override.yml
            echo "    build:" >> docker-compose.override.yml
            echo "      context: ." >> docker-compose.override.yml
            echo "      args:" >> docker-compose.override.yml
            echo "        BACKEND_URL: http://46.101.209.18:$BACKEND_PORT" >> docker-compose.override.yml
            echo "        NEXT_PUBLIC_API_URL: http://46.101.209.18:$BACKEND_PORT/api" >> docker-compose.override.yml
            echo "    ports:" >> docker-compose.override.yml
            echo "      - \"$PORT:3000\"" >> docker-compose.override.yml
            echo "    environment:" >> docker-compose.override.yml
            echo "      - BACKEND_URL=http://46.101.209.18:$BACKEND_PORT" >> docker-compose.override.yml
            echo "      - NEXT_PUBLIC_API_URL=http://46.101.209.18:$BACKEND_PORT/api" >> docker-compose.override.yml

            # Stop and remove old containers cleanly
            /usr/local/bin/docker-compose -f docker-compose.yml -f docker-compose.override.yml down --remove-orphans || true

            # Start fresh
            /usr/local/bin/docker-compose -f docker-compose.yml -f docker-compose.override.yml up --build -d
